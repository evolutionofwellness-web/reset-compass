<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Reset Compass</title>
  <link rel="stylesheet" href="main.css?v=30" />
  <script defer src="app.js?v=10"></script>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splashScreen">
    <img src="splash-icon.png" id="splashIcon" alt="Reset Compass Icon" />
  </div>

  <!-- Welcome Popup -->
  <div id="welcomePopup" class="popup">
    <div class="popup-content">
      <h2>Welcome to The Reset Compass</h2>
      <p>This tool helps you reset based on how you're feeling. Pick a mode to begin.</p>
      <button id="startButton">Let's Start</button>
    </div>
  </div>

  <!-- Main App -->
  <header>
    <h1>The Reset Compass</h1>
    <nav>
      <button onclick="navigateTo('home')">Home</button>
      <button onclick="navigateTo('quick')">Quick Wins</button>
      <button onclick="navigateTo('history')">History</button>
      <button onclick="navigateTo('about')">About</button>
    </nav>
  </header>

  <main id="mainContent">
    <div class="stats">
      <span>🔥 <span id="streak">0</span>-day streak</span>
    </div>

    <div class="compass">
      <div class="wedge growing" onclick="openMode('growing')">🚀 Growing</div>
      <div class="wedge drifting" onclick="openMode('drifting')">🧭 Drifting</div>
      <div class="wedge grounded" onclick="openMode('grounded')">🌿 Grounded</div>
      <div class="wedge surviving" onclick="openMode('surviving')">🩺 Surviving</div>
    </div>

    <div class="mode-buttons">
      <button class="growing" onclick="openMode('growing')">🚀 Growing</button>
      <button class="drifting" onclick="openMode('drifting')">🧭 Drifting</button>
      <button class="grounded" onclick="openMode('grounded')">🌿 Grounded</button>
      <button class="surviving" onclick="openMode('surviving')">🩺 Surviving</button>
    </div>
  </main>

  <footer>
    <p>© 2025 Evolution of Wellness. The Reset Compass™ is a product of Evolution of Wellness. All rights reserved.</p>
  </footer>
</body>
</html>
